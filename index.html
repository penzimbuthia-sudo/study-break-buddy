<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Break Buddy</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header id="header">
        <h2>Study Break Buddy</h2>
        <p>Welcome to your lightweight study companion that encourages <br> intentional breaks and helps prevent burnout during long focus sessions!</p>
        </header>
        <div class="container">
             <p>Take a break and <span class="highlight">reset your mind</span>
        </p>
        <button id="break">Break</button>
        <p id="quote"></p>
        <p id="author"></p>

        </div>
    <script src="script.js"></script>
</body>
</html>
